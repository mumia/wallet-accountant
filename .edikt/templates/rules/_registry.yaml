# Language packs
go:
  tier: lang
  template: lang/go.md
  paths: "**/*.go"
  version: "0.1.0"
  default: false

typescript:
  tier: lang
  template: lang/typescript.md
  paths: "**/*.{ts,tsx}"
  version: "0.1.0"
  default: false

python:
  tier: lang
  template: lang/python.md
  paths: "**/*.py"
  version: "0.1.0"
  default: false

php:
  tier: lang
  template: lang/php.md
  paths: "**/*.php"
  version: "0.1.0"
  default: false

# Framework packs
chi:
  tier: framework
  parent: go
  template: framework/chi.md
  paths: "**/*.go"
  version: "0.1.0"
  default: false

nextjs:
  tier: framework
  parent: typescript
  template: framework/nextjs.md
  paths: "**/*.{ts,tsx,js,jsx}"
  version: "0.1.0"
  default: false

laravel:
  tier: framework
  parent: php
  template: framework/laravel.md
  paths: "**/*.php"
  version: "0.1.0"
  default: false

symfony:
  tier: framework
  parent: php
  template: framework/symfony.md
  paths: "**/*.php"
  version: "0.1.0"
  default: false

rails:
  tier: framework
  parent: ruby
  template: framework/rails.md
  paths: "**/*.rb"
  version: "0.1.0"
  default: false

django:
  tier: framework
  parent: python
  template: framework/django.md
  paths: "**/*.py"
  version: "0.1.0"
  default: false
