  paths: "**/*.{html,tsx,jsx,vue,svelte,astro,md,mdx}"
  version: "0.1.0"
  default: false

api:
  tier: base
  template: base/api.md
  paths: "**/*.{go,ts,tsx,js,jsx,py,rb,php,rs,java,kt}"
  version: "0.1.0"
  default: false

database:
  tier: base
  template: base/database.md
  paths: "**/*.{go,ts,tsx,js,jsx,py,rb,php,rs,java,kt,sql}"
  version: "0.1.0"
  default: false

