# edikt Rule Registry
# Maps rule names to their template, tier, and paths: glob for .claude/rules/ frontmatter.
# Parent field indicates a framework depends on a language pack.
# Version must match the version: frontmatter in the corresponding template.

# Base (language-agnostic, fires on code files only)
code-quality:
  tier: base
  template: base/code-quality.md
  paths: "**/*.{go,ts,tsx,js,jsx,py,rb,php,rs,java,kt,swift,c,cpp,cs}"
  version: "0.1.0"
  default: true

testing:
  tier: base
  template: base/testing.md
  paths: "**/*.{go,ts,tsx,js,jsx,py,rb,php,rs,java,kt}"
  version: "0.1.0"
  default: true

security:
  tier: base
  template: base/security.md
  paths: "**/*.{go,ts,tsx,js,jsx,py,rb,php,rs,java,kt,sql}"
  version: "0.1.0"
  default: true

error-handling:
  tier: base
  template: base/error-handling.md
  paths: "**/*.{go,ts,tsx,js,jsx,py,rb,php,rs,java,kt}"
  version: "0.1.0"
  default: true

# Base (opt-in)
frontend:
  tier: base
  template: base/frontend.md
  paths: "**/*.{ts,tsx,js,jsx,vue,svelte,css,scss}"
  version: "0.1.0"
  default: false

