version: "3.8"

services:
  dev:
    build:
      dockerfile: docker/Dockerfile
    environment:
      - EVENTSTORE_CONNETION_STRING=esdb://eventstore:2113?keepAliveTimeout=10000&keepAliveInterval=10000&tls=false
          #"esdb+discover://eventstore:2113?keepAliveTimeout=10000&keepAliveInterval=10000&tls=false",
    ports:
      - "8080:8080"
      - "40000:40000"
    volumes:
      - "./:/app"
      - "./docker/dev-entrypoint.sh:/root/entrypoint.sh"
    entrypoint: ["/root/entrypoint.sh"]
    working_dir: "/app"
    depends_on:
      - eventstore
      - mongodb
      - mongo-express
    networks:
        wallet-accountant: ~

  eventstore:
    image: "eventstore/eventstore"
    environment:
      - EVENTSTORE_CLUSTER_SIZE=1
      - EVENTSTORE_RUN_PROJECTIONS=All
      - EVENTSTORE_START_STANDARD_PROJECTIONS=True
      - EVENTSTORE_EXT_TCP_PORT=1113
      - EVENTSTORE_HTTP_PORT=2113
      - EVENTSTORE_INSECURE=true
      - EVENTSTORE_DB=/var/lib/event-store-data
      - EVENTSTORE_INDEX=/var/lib/event-store-index
      - EVENTSTORE_LOG=/var/lib/event-store-logs
#      - EVENTSTORE_ENABLE_EXTERNAL_TCP=true
      - EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP=true
    ports:
      - "1113:1113"
      - "2113:2113"
    volumes:
      - "./dbdata/eventstore/data:/var/lib/event-store-data"
      - "./dbdata/eventstore/index:/var/lib/event-store-index"
      - "./dbdata/eventstore/logs:/var/lib/event-store-logs"
    networks:
      wallet-accountant: ~

  mongodb:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
      - MONGO_INITDB_DATABASE=wallet-accountant
    ports:
      - '27017:27017'
    volumes:
      - "./dbdata/mongodb:/data/db"
    networks:
      wallet-accountant: ~

  mongo-express:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongodb:27017/
    networks:
      wallet-accountant: ~

networks:
  wallet-accountant: ~